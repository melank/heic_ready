name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

jobs:
  macos-dmg:
    runs-on: macos-14
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Install cargo-binstall
        run: curl -fsSL https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install cargo-tauri
        run: cargo binstall tauri-cli --version "^2.0.0" --no-confirm

      - name: Build app bundle
        run: cargo tauri build --target aarch64-apple-darwin --bundles app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Ad-hoc codesign
        run: |
          app_path="$(find target/aarch64-apple-darwin/release/bundle/macos -maxdepth 1 -name '*.app' -print -quit)"
          codesign --force --deep -s - "${app_path}"
          codesign --verify --deep --strict "${app_path}"

      - name: Create DMG
        run: |
          rm -rf target/aarch64-apple-darwin/release/bundle/dmg
          app_path="$(find target/aarch64-apple-darwin/release/bundle/macos -maxdepth 1 -name '*.app' -print -quit)"
          app_name="$(basename "${app_path}" .app)"
          dmg_path="target/aarch64-apple-darwin/release/bundle/dmg/${app_name}_$(echo ${{ env.RELEASE_TAG }}).dmg"
          mkdir -p "$(dirname "${dmg_path}")"
          staging="${RUNNER_TEMP}/dmg-staging"
          mkdir -p "${staging}"
          cp -R "${app_path}" "${staging}/"
          ln -s /Applications "${staging}/Applications"
          hdiutil create -volname "${app_name}" -srcfolder "${staging}" -ov -format UDZO "${dmg_path}"

      - name: Upload DMG to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
