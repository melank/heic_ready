<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2EC4B6"/>
      <stop offset="100%" style="stop-color:#1B8FA0"/>
    </linearGradient>
    <linearGradient id="frame-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#EEF8F7"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>

  <!-- Image/photo frame icon (centered) -->
  <g transform="translate(256, 256)">
    <!-- Shadow -->
    <rect x="-100" y="-125" width="200" height="250" rx="18" ry="18" fill="rgba(0,0,0,0.08)" transform="translate(3,3)"/>
    <!-- Frame -->
    <rect x="-100" y="-125" width="200" height="250" rx="18" ry="18" fill="url(#frame-grad)"/>

    <!-- Mountain landscape -->
    <polygon points="-62,72 -10,-20 28,36 56,-30 80,72" fill="#2EC4B6" opacity="0.45"/>
    <polygon points="-62,72 6,10 52,72" fill="#1B8FA0" opacity="0.35"/>

    <!-- Sun -->
    <circle cx="48" cy="-58" r="22" fill="#FFD166" opacity="0.85"/>
  </g>
</svg>
